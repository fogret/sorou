name: Auto Channel Scan

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run channel_ai.py
        run: python channel_ai.py

      - name: Upload channel list
        uses: actions/upload-artifact@v4
        with:
          name: channel-list
          path: 频道分类列表.txt
