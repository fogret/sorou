name: Auto Update Channel

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run channel_ai.py
        run: python channel_ai.py

      - name: Commit and push to repo
        uses: ad-m/github-push-action@master
        with:
          branch: main
          directory: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto update channel list $(date +'%Y-%m-%d %H:%M')"
