name: Generate M3U

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run script
        run: python generate_m3u.py

      - name: Commit & Push
        uses: EndBug/add-and-commit@v9
        with:
          message: Update m3u
          committer_name: GitHub Actions
          committer_email: actions@github.com
