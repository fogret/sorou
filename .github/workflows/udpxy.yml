name: Scan udpxy

on:
  schedule:
    - cron: '0 7,15 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run udpxy scan
        run: python udpxy.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add ip/浙江电信_ip.txt
          git commit -m "Update udpxy 浙江电信" || exit 0
          git push
