name: 贵州电信 udpxy 扫描

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  scan-udpxy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests ipaddress

      - name: Write udpxy.py
        run: |
          cat > udpxy.py << 'EOF'
import requests
import ipaddress
from concurrent.futures import ThreadPoolExecutor

# 贵州电信 IP 段
IP_RANGES = [
    "58.42.0.0/16",
    "211.98.0.0/16",
    "219.141.0.0/16",
    "222.86.0.0/15",
    "111.123.0.0/16",
    "113.206.0.0/16",
    "183.66.0.0/16",
]

PORTS = [4022, 8888, 8080, 5000, 5002, 8000, 9000, 9090, 6666, 7777]
RESULT_FILE = "udpxy_result.txt"

def check_udpxy(ip, port):
    try:
        url = f"http://{ip}:{port}/status"
        r = requests.get(url, timeout=2)
        if r.status_code == 200 and "udpxy" in r.text.lower():
            return f"{ip}:{port}"
    except:
        return None

def main():
    found = []
    tasks = []
    with ThreadPoolExecutor(max_workers=100) as executor:
        for ip_range in IP_RANGES:
            net = ipaddress.IPv4Network(ip_range, strict=False)
            for ip in net.hosts():
                for p in PORTS:
                    tasks.append(executor.submit(check_udpxy, str(ip), p))

        for t in tasks:
            res = t.result()
            if res:
                print("[+] Found:", res)
                found.append(res)

    with open(RESULT_FILE, "w", encoding="utf-8") as f:
        f.write("\n".join(found))

if __name__ == "__main__":
    main()
EOF

      - name: Run udpxy scan
        run: python udpxy.py

      - name: Commit & Push
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "action@github.com"
          git add udpxy_result.txt || true
          git commit -m "Update udpxy result" || true
          git push
